name: camping-drive

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SITE_URL: https://camping.drivebro.ru
        VITE_WEB3FORMS_ACCESS_KEY: ${VITE_WEB3FORMS_ACCESS_KEY:?Set VITE_WEB3FORMS_ACCESS_KEY in .env.local}
        VITE_YANDEX_METRIKA_ID: ${VITE_YANDEX_METRIKA_ID:-}
    image: camping-drive:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:80"
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
