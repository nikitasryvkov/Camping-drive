name: camping-drive

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SITE_URL: https://camping.drivebro.ru
        VITE_WEB3FORMS_ACCESS_KEY: ${VITE_WEB3FORMS_ACCESS_KEY:?Set VITE_WEB3FORMS_ACCESS_KEY in .env.local}
        VITE_YANDEX_METRIKA_ID: ${VITE_YANDEX_METRIKA_ID:-}
    image: camping-drive:${IMAGE_TAG:-latest}
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - web
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2.11.4-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  web:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
