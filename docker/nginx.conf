limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=public_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=public_html:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=per_ip:10m;

set_real_ip_from 10.253.12.0/24;
set_real_ip_from 10.254.12.0/24;
real_ip_header X-Forwarded-For;
real_ip_recursive on;

map $http_x_forwarded_proto $upstream_forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;
    server_tokens off;

    client_max_body_size 2m;
    client_body_timeout 10s;
    keepalive_timeout 20s;
    keepalive_requests 500;
    limit_req_status 429;
    limit_conn_status 429;
    limit_conn per_ip 30;
    error_page 413 = @api_payload_too_large;
    error_page 429 = @api_rate_limited;
    error_page 502 504 =503 @api_unavailable;
    proxy_intercept_errors on;

    sendfile on;
    tcp_nopush on;
    etag on;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    include /etc/nginx/security-headers.conf;

    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 2s;
    proxy_send_timeout 15s;
    proxy_read_timeout 15s;

    location = /healthz {
        access_log off;
        set $backend http://backend:3000;
        proxy_pass $backend/api/health/ready;
        proxy_connect_timeout 2s;
        proxy_read_timeout 3s;
        proxy_next_upstream off;
    }

    location = /api/auth/login {
        client_max_body_size 16k;
        limit_req zone=auth_login burst=3 nodelay;
        set $backend http://backend:3000;
        proxy_pass $backend$request_uri;
        include /etc/nginx/proxy-params.conf;
    }

    location = /api/auth/login/ {
        return 308 /api/auth/login;
    }

    location = /api/images {
        client_max_body_size 16m;
        proxy_request_buffering off;
        limit_conn per_ip 3;
        limit_req zone=api_general burst=10 nodelay;
        set $backend http://backend:3000;
        proxy_pass $backend$request_uri;
        include /etc/nginx/proxy-params.conf;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location = /api/images/ {
        return 308 /api/images;
    }

    location /api/public/ {
        limit_req zone=public_api burst=60 nodelay;
        set $backend http://backend:3000;
        proxy_pass $backend$request_uri;
        include /etc/nginx/proxy-params.conf;
    }

    location /api/ {
        limit_req zone=api_general burst=20 nodelay;
        set $backend http://backend:3000;
        proxy_pass $backend$request_uri;
        include /etc/nginx/proxy-params.conf;
    }

    location ^~ /uploads/ {
        limit_except GET HEAD { deny all; }
        set $backend http://backend:3000;
        proxy_pass $backend$request_uri;
        include /etc/nginx/proxy-params.conf;
    }

    location ~* \.map$ {
        access_log off;
        return 404;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        include /etc/nginx/security-headers.conf;
        try_files $uri =404;
    }

    location ~* \.(?:webp|avif|png|jpe?g|svg|ico)$ {
        expires -1;
        try_files $uri =404;
    }

    location ~* \.(?:mp4|webm|mov)$ {
        expires -1;
        try_files $uri =404;
    }

    location = /index.html {
        expires -1;
        try_files $uri =404;
    }

    location = /admin {
        expires -1;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        include /etc/nginx/security-headers.conf;
        try_files /index.html =404;
    }

    location ^~ /admin/ {
        expires -1;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        include /etc/nginx/security-headers.conf;
        try_files $uri /index.html;
    }

    location @api_payload_too_large {
        default_type application/json;
        return 413 '{"error":{"code":"PAYLOAD_TOO_LARGE","message":"Request payload is too large"}}';
    }

    location @api_rate_limited {
        default_type application/json;
        return 429 '{"error":{"code":"RATE_LIMITED","message":"Too many requests"}}';
    }

    location @api_unavailable {
        internal;
        default_type application/json;
        add_header Cache-Control "no-store" always;
        include /etc/nginx/security-headers.conf;
        return 503 '{"error":{"code":"SERVICE_UNAVAILABLE","message":"Service is temporarily unavailable"}}';
    }

    location @public_unavailable {
        internal;
        root /usr/share/nginx/html;
        default_type text/html;
        add_header Cache-Control "no-store" always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        include /etc/nginx/security-headers.conf;
        try_files /index.html =503;
    }

    location = / {
        limit_req zone=public_html burst=30 nodelay;
        set $backend http://backend:3000;
        proxy_pass $backend/internal/render/page/home;
        include /etc/nginx/proxy-params.conf;
        proxy_intercept_errors on;
        error_page 500 502 503 504 =503 @public_unavailable;
    }

    location = /news {
        limit_req zone=public_html burst=30 nodelay;
        set $backend http://backend:3000;
        proxy_pass $backend/internal/render/news$is_args$args;
        include /etc/nginx/proxy-params.conf;
        proxy_intercept_errors on;
        error_page 500 502 503 504 =503 @public_unavailable;
    }

    location = /news/ {
        limit_req zone=public_html burst=30 nodelay;
        set $backend http://backend:3000;
        proxy_pass $backend/internal/render/news$is_args$args;
        include /etc/nginx/proxy-params.conf;
        proxy_intercept_errors on;
        error_page 500 502 503 504 =503 @public_unavailable;
    }

    location ~ ^/news/([^/]+)/?$ {
        limit_req zone=public_html burst=30 nodelay;
        set $backend http://backend:3000;
        proxy_pass $backend/internal/render/news/$1$is_args$args;
        include /etc/nginx/proxy-params.conf;
        proxy_intercept_errors on;
        error_page 500 502 503 504 =503 @public_unavailable;
    }

    location ~ ^/([^/]+)/?$ {
        limit_req zone=public_html burst=30 nodelay;
        set $backend http://backend:3000;
        proxy_pass $backend/internal/render/page/$1$is_args$args;
        include /etc/nginx/proxy-params.conf;
        proxy_intercept_errors on;
        error_page 500 502 503 504 =503 @public_unavailable;
    }

    location / {
        try_files $uri =404;
    }
}
