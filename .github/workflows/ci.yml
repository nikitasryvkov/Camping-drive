name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.23.1
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run lint
      - run: npm run test:contracts
      - run: npm run test:backend:coverage
      - run: npm run test:stage9
      - run: npm run audit:dependencies
      - run: npm --prefix server audit --audit-level=high
      - name: Validate Compose files
        env:
          POSTGRES_PASSWORD: ci-owner-password-not-used-outside-ci
          APP_DB_PASSWORD: ci-runtime-password-not-used-outside-ci
          PUBLIC_SITE_URL: https://ci.example
          PUBLIC_ORIGINS: https://ci.example
          VITE_SITE_URL: https://ci.example
          IMAGE_TAG: ci
        run: |
          docker compose -f compose.yaml config --quiet
          docker compose -f compose.app-only.yaml config --quiet
          docker compose -f compose.app-only.yaml -f compose.dev.yaml config --quiet
          docker compose -f compose.test.yaml config --quiet

  container-scan:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile
          target: frontend-runtime
          load: true
          tags: camping-drive-frontend:scan
          build-args: VCS_REF=${{ github.sha }}
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile
          target: backend-runtime
          load: true
          tags: camping-drive-backend:scan
          build-args: VCS_REF=${{ github.sha }}
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: docker/postgres.Dockerfile
          load: true
          tags: camping-drive-postgres:scan
          build-args: VCS_REF=${{ github.sha }}
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: docker/caddy.Dockerfile
          load: true
          tags: camping-drive-caddy:scan
          build-args: VCS_REF=${{ github.sha }}
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: camping-drive-frontend:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: camping-drive-backend:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: camping-drive-postgres:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: camping-drive-caddy:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
      - name: Verify shared frontend artifact
        run: |
          docker run --rm --entrypoint cat camping-drive-frontend:scan /usr/share/nginx/html/index.html > /tmp/frontend-index.html
          docker run --rm --entrypoint cat camping-drive-backend:scan /app/public/index.html > /tmp/backend-index.html
          diff -u /tmp/frontend-index.html /tmp/backend-index.html
      - name: Disaster-recovery smoke test
        run: sh scripts/dr-smoke-test.sh
      - name: Managed-edge disaster-recovery smoke test
        run: DR_COMPOSE_FILE=compose.yaml sh scripts/dr-smoke-test.sh
